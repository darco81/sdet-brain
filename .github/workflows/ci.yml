name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check src tests
      - name: ruff format --check
        run: uv run ruff format --check src tests
      - name: mypy strict
        run: uv run mypy src tests

  # The MLX providers are gated behind `sys_platform == 'darwin'` markers, so
  # `uv sync` on Linux is naturally MLX-free; the two MLX provider tests skip
  # on their platform guard. Everything else runs against a real Qdrant.
  test-linux:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.17.1
        ports:
          - 6333:6333
    env:
      QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz; then echo "qdrant ready"; exit 0; fi
            sleep 1
          done
          echo "Qdrant did not become ready" >&2
          exit 1
      - name: pytest (with Qdrant)
        run: uv run pytest -q
